    /* Franja de color superior */
    .tile__band {
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 15%;
        background-color: #EB8DED;
        border-bottom: 1.5px solid #010101;
        z-index: 2;
    }

    /* Overlay semitransparente para legibilidad sobre la foto */
    .tile__overlay {
        position: absolute;
        top: 15%; left: 0; right: 0; bottom: 0;
        background: rgba(255,255,255,0.38);
        z-index: 1;
    }

    /* Nombre de la casilla */
    .tile__name {
        position: absolute;
        top: 26%;
        left: 4%; right: 4%;
        text-align: center;
        font-size: 11px;
        font-weight: normal;
        color: #010101;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        line-height: 1.2;
        z-index: 3;
        text-shadow: 0 1px 2px rgba(255,255,255,0.9);
        word-break: break-word;
    }

    /* Precio en la parte inferior */
    .tile__price {
        position: absolute;
        top: 92%;
        left: 0; right: 0;
        text-align: center;
        font-size: 10px;
        color: #010101;
        z-index: 3;
        text-shadow: 0 1px 3px rgba(255,255,255,0.9);
    }
</style>
</head>

<div class="tile">
    <div class="tile__band"></div>
    <div class="tile__overlay"></div>
    <div class="tile__name">Colapso del Periférico</div>
    
</div>
