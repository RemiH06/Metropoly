    html, body {
        width: 200px; height: 350px;
        overflow: hidden;
        background: transparent;
    }

    .card {
        width: 200px; height: 350px;
        border: 2.5px solid #010101;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        position: relative;
    }

    /* ── Franja superior ───────────────────────────── */
    .card__band {
        width: 100%;
        height: 48px;
        background-color: #9B111E;
        border-bottom: 1.5px solid #010101;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        padding: 0 6px;
    }

    .card__type {
        font-size: 11px;
        color: rgba(255,255,255,0.85);
        letter-spacing: 0.12em;
        text-transform: uppercase;
    }

    .card__name {
        font-size: 17px;
        color: #fff;
        text-transform: uppercase;
        text-align: center;
        line-height: 1.1;
        letter-spacing: 0.04em;
        text-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }

    /* ── Cuerpo ────────────────────────────────────── */
    .card__body {
        flex: 1;
        background-color: #CDE6D0;
        position: relative;
        display: flex;
        flex-direction: column;
    }

    /* Overlay para que el texto sea legible sobre la foto */
    .card__body-overlay {
        position: absolute;
        inset: 0;
        background: rgba(255,255,255,0.55);
        z-index: 0;
    }

    .card__content {
        position: relative;
        z-index: 1;
        padding: 10px 8px 8px;
        flex: 1;
        display: flex;
        flex-direction: column;
    }

    /* ── Subtítulo de tipo ─────────────────────────── */
    .card__subtitle {
        font-size: 12px;
        text-align: center;
        color: #010101;
        opacity: 0.65;
        margin-bottom: 8px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
    }

    /* ── Tabla de detalles ─────────────────────────── */
    .detail-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
    }

    .detail-table tr {
        border-bottom: 1px solid rgba(0,0,0,0.10);
    }

    .detail-label {
        color: #010101;
        padding: 3px 4px;
        width: 52%;
        opacity: 0.80;
    }

    .detail-value {
        color: #010101;
        padding: 3px 4px;
        text-align: right;
        font-weight: 900;
    }

    /* ── Pie: precio hipoteca / compra ─────────────── */
    .card__footer {
        border-top: 1.5px solid #010101;
        padding: 5px 8px;
        font-size: 12px;
        color: #010101;
